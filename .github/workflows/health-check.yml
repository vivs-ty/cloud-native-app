name: Health Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes
  workflow_dispatch:  # Allow manual triggering

jobs:
  health-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Resolve target URL
      id: target
      run: |
        if [ -n "${{ vars.APP_URL }}" ]; then
          echo "url=${{ vars.APP_URL }}" >> "$GITHUB_OUTPUT"
          echo "started_local=false" >> "$GITHUB_OUTPUT"
        else
          echo "APP_URL variable not set. Starting local Docker fallback."
          docker build -t cloud-native-app:monitor .
          docker run -d --name cloud-native-app -p 8000:8000 cloud-native-app:monitor

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              break
            fi
            sleep 2
          done

          echo "url=http://127.0.0.1:8000" >> "$GITHUB_OUTPUT"
          echo "started_local=true" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Run health check
      run: python scripts/health_check.py "${{ steps.target.outputs.url }}"
      continue-on-error: true
    
    - name: Create health check issue if failed
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          const repoInfo = await github.rest.repos.get({
            owner: context.repo.owner,
            repo: context.repo.repo
          });

          if (!repoInfo.data.has_issues) {
            core.notice('Repository issues are disabled. Skipping issue creation.');
            core.summary
              .addHeading('Health Check Alert')
              .addRaw('Health check failed, but repository issues are disabled so no issue was created.')
              .write();
            return;
          }

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Health Check Failed',
            body: `Health check failed at ${new Date().toISOString()}\nPlease check the service status.`,
            labels: ['incident', 'automated']
          });
    
    - name: Notify on Slack
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      continue-on-error: true

    - name: Cleanup local fallback resources
      if: always() && steps.target.outputs.started_local == 'true'
      run: |
        docker stop cloud-native-app || true
        docker rm -f cloud-native-app || true
        docker image rm cloud-native-app:monitor || true
