name: Status Monitor

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '*/30 * * * *'  # Run every 30 minutes
  workflow_dispatch:  # Allow manual triggering

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psutil

    - name: Resolve target URL
      id: target
      run: |
        if [ -n "${{ vars.APP_URL }}" ]; then
          echo "url=${{ vars.APP_URL }}" >> "$GITHUB_OUTPUT"
          echo "started_local=false" >> "$GITHUB_OUTPUT"
        else
          echo "APP_URL variable not set. Starting local Docker fallback."
          docker build -t cloud-native-app:monitor .
          docker run -d --name cloud-native-app -p 8000:8000 cloud-native-app:monitor

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              break
            fi
            sleep 2
          done

          echo "url=http://127.0.0.1:8000" >> "$GITHUB_OUTPUT"
          echo "started_local=true" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Run status check
      id: status
      run: |
        OUTPUT=$(python scripts/status_check.py "${{ steps.target.outputs.url }}")
        echo "status_output<<EOF" >> $GITHUB_ENV
        echo "$OUTPUT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV
    
    - name: Update status badge
      uses: schneegans/dynamic-badges-action@v1.6.0
      with:
        auth: ${{ secrets.GIST_SECRET }}
        gistID: ${{ secrets.GIST_ID }}
        filename: cloud_native_app_status.json
        label: status
        message: ${{ job.status }}
        color: ${{ job.status == 'success' && 'success' || 'critical' }}
      continue-on-error: true
    
    - name: Create status report
      uses: actions/github-script@v7
      with:
        script: |
          const date = new Date().toISOString();
          const status = process.env.status_output;
          const repoInfo = await github.rest.repos.get({
            owner: context.repo.owner,
            repo: context.repo.repo
          });

          if (!repoInfo.data.has_issues) {
            core.notice('Repository issues are disabled. Skipping status issue create/update.');
            core.summary
              .addHeading('Status Report')
              .addCodeBlock(status || 'No status output captured.', 'json')
              .write();
            return;
          }
          
          // Create or update status report issue
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['status-report'],
            state: 'open'
          });
          
          const body = `## Status Report (${date})
          \`\`\`json
          ${status}
          \`\`\``;
          
          if (issues.data.length > 0) {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issues.data[0].number,
              body: body
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📊 Service Status Report',
              body: body,
              labels: ['status-report']
            });
          }
    
    - name: Send metrics to CloudWatch
      if: false  # Disabled by default, enable if using AWS
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
      # Add CloudWatch metrics push here if needed

    - name: Cleanup local fallback resources
      if: always() && steps.target.outputs.started_local == 'true'
      run: |
        docker stop cloud-native-app || true
        docker rm -f cloud-native-app || true
        docker image rm cloud-native-app:monitor || true
