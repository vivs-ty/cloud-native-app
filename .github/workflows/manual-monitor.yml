name: Manual Monitoring Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of test to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - health
          - status

jobs:
  test-monitoring:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psutil

    - name: Resolve target URL
      id: target
      run: |
        if [ -n "${{ vars.APP_URL }}" ]; then
          echo "url=${{ vars.APP_URL }}" >> "$GITHUB_OUTPUT"
          echo "started_local=false" >> "$GITHUB_OUTPUT"
        else
          echo "APP_URL variable not set. Starting local Docker fallback."
          docker build -t cloud-native-app:monitor .
          docker run -d --name cloud-native-app -p 8000:8000 cloud-native-app:monitor

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              break
            fi
            sleep 2
          done

          echo "url=http://127.0.0.1:8000" >> "$GITHUB_OUTPUT"
          echo "started_local=true" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Run health check
      if: github.event.inputs.test_type == 'health' || github.event.inputs.test_type == 'all'
      run: |
        echo "Running health check..."
        python scripts/health_check.py "${{ steps.target.outputs.url }}"
    
    - name: Run status check
      if: github.event.inputs.test_type == 'status' || github.event.inputs.test_type == 'all'
      run: |
        echo "Running status check..."
        python scripts/status_check.py "${{ steps.target.outputs.url }}"
    
    - name: Summary
      run: |
        echo "## Monitoring Test Results" >> $GITHUB_STEP_SUMMARY
        echo "✅ Tests completed" >> $GITHUB_STEP_SUMMARY
        echo "Check the logs above for detailed results" >> $GITHUB_STEP_SUMMARY

    - name: Cleanup local fallback resources
      if: always() && steps.target.outputs.started_local == 'true'
      run: |
        docker stop cloud-native-app || true
        docker rm -f cloud-native-app || true
        docker image rm cloud-native-app:monitor || true
